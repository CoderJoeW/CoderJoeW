name: dashboard

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/build-dashboard.mjs'
      - '.github/workflows/dashboard.yml'

permissions:
  contents: write

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Render panels
        env:
          # METRICS_TOKEN (a classic PAT with read:user) also counts private
          # contributions. Without it the built-in token works, public only.
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/build-dashboard.mjs

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets README.md
          if git diff --staged --quiet; then
            echo 'No change.'
          else
            git commit -m 'Rebuild dashboard panels'
            git push
          fi
